# 2. 主题与样式（推荐Material主题）
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - search.suggest
    - search.highlight
  palette:
    primary: indigo

# 3. 插件（必需项！）
plugins:
  - search  # 搜索插件
  # 在本地预览时可启用此插件，但在GitHub Actions中会自动构建
  # - mkdocs-material

# 4. 扩展（Markdown增强）
markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true