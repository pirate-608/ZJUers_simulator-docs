# 2. 主题与样式（推荐Material主题）
theme:
  name: material
  custom_dir: overrides
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - toc.integrate
    - search.suggest
    - search.highlight
    - search.share
    - navigation.footer
  palette:
    - scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/weather-night
        name: 切换到暗色主题
    - scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/white-balance-sunny
        name: 切换到亮色主题
  favicon: assets/images/favicon.ico
  logo: assets/images/logo.png

# 2.1 页脚备案信息
extra:
  copyright: '<a href="http://beian.miit.gov.cn/" rel="noopener" target="_blank">浙ICP备2026007685号</a>'
  generator: false

extra_css:
  - assets/css/custom-cards.css
  - assets/css/theme-tweaks.css
  - assets/css/fix-footer.css

# 3. 插件（必需项！）
plugins:
  - search # 搜索插件
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      width: 90%
      height: auto

# 4. 扩展（Markdown增强）
markdown_extensions:
  - meta
  - admonition
  - codehilite
  - attr_list  # 允许在标题等处使用 {#id}
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.keys
  - pymdownx.tilde  # 支持删除线 ~~text~~
  - toc:
      permalink: true